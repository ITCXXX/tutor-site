{% extends "users/visitor_base.html" %}
{% load static %}

{% block title %}{{ material.title }}{% endblock %}

{% block extra_css %}
<style>
.viewer-wrapper {
    margin-top: 56px;
    height: calc(100vh - 56px);
    display: flex;
    flex-direction: column;
    background: var(--c-gray-100);
}

.viewer-header {
    background: #fff;
    border-bottom: 1px solid var(--c-border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-shrink: 0;
    min-height: 48px;
}
.viewer-title {
    font-weight: 600;
    font-size: .95rem;
    color: var(--c-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
}
.viewer-meta {
    color: var(--c-text-muted);
    font-size: .85rem;
}

.viewer-frame {
    flex: 1;
    width: 100%;
    border: none;
    background: var(--c-gray-200);
}
</style>
{% endblock %}

{% block content %}
<div class="viewer-wrapper">
    <iframe class="viewer-frame"
            src="{{ material.file.url }}#toolbar=1&navpanes=0"
            title="{{ material.title }}"></iframe>
</div>
{% endblock %}
