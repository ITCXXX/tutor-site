{% extends "users/visitor_base.html" %}
{% load static %}

{% block title %}Курсы по математике{% endblock %}

{% block content %}
<section style="padding-top: 80px; min-height: 70vh;">
    <div class="container">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold mb-0">Курсы по математике</h1>
        </div>

        {% if courses %}
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            {% for course in courses %}
            <div class="col">
                <a href="{% url 'course_detail' course.slug %}"
                   class="card h-100 shadow-sm border-0 text-decoration-none text-reset hover-shadow"
                   style="transition: transform 0.2s;">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="card-title mb-0 text-center">{{ course.title }}</h5>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="text-center py-5">
            <h3 class="my-3 text-muted">Курсы в разработке</h3>
        </div>
        {% endif %}
    </div>
</section>

<style>
.hover-shadow:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
}
</style>
{% endblock %}
